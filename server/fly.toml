# fly.toml app configuration file generated for knocks-server on 2026-03-31T10:14:46+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'knocks-server'
primary_region = 'sin'

[build]

[env]
  CLIENT_URL = 'https://knocks.vercel.app'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
